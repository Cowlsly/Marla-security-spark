name: Cleanup Actions Storage
# Runs weekly, on workflow_dispatch, and when this file changes on main.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup_artifacts.yml
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      artifact_retention_days:
        description: Delete artifacts older than this many days
        required: false
        default: '7'
        type: string
      delete_all_artifacts:
        description: Delete all artifacts (ignores retention days)
        required: false
        default: false
        type: boolean
      delete_caches:
        description: Delete all workflow caches
        required: false
        default: true
        type: boolean
      delete_old_runs:
        description: Delete completed workflow runs older than retention days
        required: false
        default: true
        type: boolean

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deleteAll = '${{ github.event_name }}' === 'push' || ${{ inputs.delete_all_artifacts == true }};
            const retentionDays = Number('${{ inputs.artifact_retention_days || '7' }}');
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - retentionDays);

            let page = 1;
            let deleted = 0;
            let bytes = 0;

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              if (data.artifacts.length === 0) break;

              for (const artifact of data.artifacts) {
                const created = new Date(artifact.created_at);
                if (deleteAll || created < cutoff) {
                  await github.rest.actions.deleteArtifact({
                    owner,
                    repo,
                    artifact_id: artifact.id,
                  });
                  deleted++;
                  bytes += artifact.size_in_bytes || 0;
                }
              }

              if (data.artifacts.length < 100) break;
              page++;
            }

            core.info(`Deleted ${deleted} artifacts (~${(bytes / 1024 / 1024).toFixed(2)} MiB)`);

      - name: Delete workflow caches
        if: ${{ github.event_name == 'push' || inputs.delete_caches != false }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let page = 1;
            let deleted = 0;

            while (true) {
              const { data } = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const caches = data.actions_caches || [];
              if (caches.length === 0) break;

              for (const cache of caches) {
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id,
                });
                deleted++;
              }

              if (caches.length < 100) break;
              page++;
            }

            core.info(`Deleted ${deleted} caches`);

      - name: Delete old workflow runs
        if: ${{ github.event_name == 'push' || inputs.delete_old_runs != false }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const retentionDays = Number('${{ inputs.artifact_retention_days || '7' }}');
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - retentionDays);

            let page = 1;
            let deleted = 0;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const runs = data.workflow_runs || [];
              if (runs.length === 0) break;

              for (const run of runs) {
                if (run.status !== 'completed') continue;
                const created = new Date(run.created_at);
                if (created < cutoff) {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  deleted++;
                }
              }

              if (runs.length < 100) break;
              page++;
            }

            core.info(`Deleted ${deleted} workflow runs`);
