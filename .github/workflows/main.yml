name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "feat/complete-one-documented-task"]

jobs:
  build:
    name: Build Marla Security Spark (self-contained from checked-in source)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK from checked-in source (app/ + Gradle files at root)
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarlaSecuritySpark-debug-apk
          path: app/build/outputs/apk/debug/*.apk
